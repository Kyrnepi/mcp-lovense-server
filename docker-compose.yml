services:
  lovense-mcp:
    build: .
    container_name: lovense-mcp-server
    ports:
      - "8000:8000"
    environment:
      # Lovense Remote Game Mode Configuration
      GAME_MODE_IP: "${GAME_MODE_IP}"
      GAME_MODE_PORT: "${GAME_MODE_PORT:-30010}"

      # MCP Authentication Token (Bearer, optional)
      MCP_AUTH_TOKEN: "${MCP_AUTH_TOKEN}"

      # MCP Transport: "streamable-http" (default for Docker) or "stdio"
      MCP_TRANSPORT: "streamable-http"

      # External hostname for DNS rebinding protection (e.g. mcplovense.nahoj.net)
      EXTERNAL_HOST: "${EXTERNAL_HOST:-}"

      # Allowed Origins for DNS rebinding protection (comma-separated, optional)
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-}"

      # Server configuration
      HOST: "0.0.0.0"
      PORT: "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - lovense-network

networks:
  lovense-network:
    driver: bridge
